<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .float-slow { animation: floatSlow 7s ease-in-out infinite; }
      .float-mid { animation: floatMid 5.8s ease-in-out infinite; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .dash { stroke-dasharray: 9 12; animation: dashMove 16s linear infinite; }
      .fade-up { animation: fadeUp 1.1s ease-out both; }
      .fade-up-delay { animation: fadeUp 1.1s ease-out 0.18s both; }
      .fade-up-delay-2 { animation: fadeUp 1.1s ease-out 0.34s both; }
      .grid-move { animation: gridMove 22s linear infinite; }
      @keyframes floatSlow { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
      @keyframes floatMid { 0%,100% { transform: translateY(0px) translateX(0px); } 50% { transform: translateY(10px) translateX(-6px); } }
      @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
      @keyframes dashMove { to { stroke-dashoffset: -260; } }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes gridMove { from { transform: translate(0,0); } to { transform: translate(32px,32px); } }
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.38" stop-color="#0F172A"/>
      <stop offset="0.68" stop-color="#111827"/>
      <stop offset="1" stop-color="#1E1B4B"/>
      <animate attributeName="x1" values="0;120;0" dur="10s" repeatCount="indefinite" />
      <animate attributeName="x2" values="1200;1040;1200" dur="10s" repeatCount="indefinite" />
    </linearGradient>

    <linearGradient id="accent" x1="90" y1="60" x2="1120" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.48" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>

    <linearGradient id="cardStroke" x1="64" y1="52" x2="724" y2="316" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.65"/>
      <stop offset="0.5" stop-color="#334155" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0.65"/>
    </linearGradient>

    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 86) rotate(40) scale(320 220)">
      <stop stop-color="#2563EB" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowPurple" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(950 278) rotate(35) scale(340 235)">
      <stop stop-color="#7C3AED" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow" x="-40" y="-40" width="1280" height="460" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <filter id="softGlow" x="-40" y="-40" width="1280" height="460" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.20 0 1 0 0 0.55 0 0 1 0 1 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#94A3B8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="380" rx="30" fill="url(#bg)"/>
  <g class="grid-move"><rect x="-32" y="-32" width="1264" height="444" rx="30" fill="url(#grid)"/></g>
  <rect width="1200" height="380" rx="30" fill="url(#glowBlue)"/>
  <rect width="1200" height="380" rx="30" fill="url(#glowPurple)"/>

  <g filter="url(#softGlow)">
    <path class="dash" d="M74 297 C230 226 360 346 524 273 C684 202 788 103 1122 148" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round" opacity="0.58"/>
    <path class="dash" d="M72 322 C260 246 360 356 546 296 C704 245 810 150 1126 185" stroke="url(#accent)" stroke-width="1.4" stroke-linecap="round" opacity="0.32"/>
  </g>

  <circle class="pulse" cx="1014" cy="86" r="6" fill="#38BDF8"/>
  <circle class="pulse" cx="1084" cy="309" r="5" fill="#A855F7"/>
  <circle class="pulse" cx="676" cy="58" r="4" fill="#22C55E"/>

  <g class="fade-up" filter="url(#shadow)">
    <rect x="58" y="52" width="668" height="264" rx="28" fill="#0B1220" fill-opacity="0.84" stroke="url(#cardStroke)"/>
    <rect x="94" y="86" width="132" height="32" rx="16" fill="#172554" stroke="#2563EB"/>
    <text x="160" y="107" text-anchor="middle" fill="#BAE6FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="0.6">PRODUCT BUILDER</text>

    <text x="94" y="164" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="850">Melad Samuel</text>
    <text x="97" y="205" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Full Stack • Cloud Native • Kubernetes Security</text>
    <text x="98" y="238" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Building practical products from idea to production.</text>

    <g class="fade-up-delay-2">
      <rect x="96" y="268" width="116" height="32" rx="16" fill="#0F172A" stroke="#334155"/>
      <text x="154" y="289" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">WordPress</text>
      <rect x="224" y="268" width="86" height="32" rx="16" fill="#0F172A" stroke="#334155"/>
      <text x="267" y="289" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">React</text>
      <rect x="322" y="268" width="116" height="32" rx="16" fill="#0F172A" stroke="#334155"/>
      <text x="380" y="289" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">Kubernetes</text>
      <rect x="450" y="268" width="96" height="32" rx="16" fill="#0F172A" stroke="#334155"/>
      <text x="498" y="289" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">Security</text>
    </g>
  </g>

  <g class="float-slow" filter="url(#shadow)">
    <rect x="770" y="58" width="356" height="244" rx="26" fill="#0B1220" fill-opacity="0.88" stroke="#334155"/>
    <text x="804" y="103" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="850">Live build dashboard</text>
    <text x="804" y="129" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Current product focus</text>

    <g class="fade-up-delay">
      <rect x="804" y="152" width="290" height="38" rx="13" fill="#0F172A" stroke="#1E293B"/>
      <circle class="pulse" cx="826" cy="171" r="6" fill="#22C55E"/>
      <text x="844" y="176" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">Building FormInbox</text>

      <rect x="804" y="202" width="290" height="38" rx="13" fill="#0F172A" stroke="#1E293B"/>
      <circle class="pulse" cx="826" cy="221" r="6" fill="#38BDF8"/>
      <text x="844" y="226" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">Shipping product systems</text>

      <rect x="804" y="252" width="290" height="38" rx="13" fill="#0F172A" stroke="#1E293B"/>
      <circle class="pulse" cx="826" cy="271" r="6" fill="#A855F7"/>
      <text x="844" y="276" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">Cloud Native + Security</text>
    </g>
  </g>

  <g class="float-mid" opacity="0.95">
    <rect x="778" y="318" width="92" height="30" rx="15" fill="#172554" stroke="#2563EB"/>
    <text x="824" y="338" text-anchor="middle" fill="#DBEAFE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="800">MVP</text>
    <rect x="882" y="318" width="112" height="30" rx="15" fill="#312E81" stroke="#6366F1"/>
    <text x="938" y="338" text-anchor="middle" fill="#E0E7FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="800">Feedback</text>
    <rect x="1006" y="318" width="106" height="30" rx="15" fill="#3B0764" stroke="#A855F7"/>
    <text x="1059" y="338" text-anchor="middle" fill="#F3E8FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="800">Growth</text>
  </g>

  <rect x="0.5" y="0.5" width="1199" height="379" rx="29.5" stroke="#334155"/>
</svg>
