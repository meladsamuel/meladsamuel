<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .grid { animation: gridMove 28s linear infinite; }
      .float { animation: float 7s ease-in-out infinite; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .dash { stroke-dasharray: 10 12; animation: dash 18s linear infinite; }
      .fade { animation: fade 1s ease-out both; }
      .fade2 { animation: fade 1s ease-out .25s both; }
      .typing { animation: typeReveal 7s steps(12,end) infinite; }
      .caret { animation: caretBlink .8s steps(1,end) infinite, caretMove 7s steps(12,end) infinite; }
      @keyframes gridMove { from { transform: translate(0,0); } to { transform: translate(32px,32px); } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -240; } }
      @keyframes fade { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
      @keyframes typeReveal { 0%,10% { width:0px; } 48%,78% { width:430px; } 100% { width:0px; } }
      @keyframes caretMove { 0%,10% { transform: translateX(0); } 48%,78% { transform: translateX(430px); } 100% { transform: translateX(0); } }
      @keyframes caretBlink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
    </style>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#000" stroke-opacity=".045"/>
    </pattern>
    <filter id="shadow" x="-40" y="-40" width="1280" height="460">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity=".13"/>
    </filter>
    <clipPath id="nameClip">
      <rect class="typing" x="94" y="118" width="430" height="62"/>
    </clipPath>
  </defs>

  <rect width="1200" height="380" rx="30" fill="#fff"/>
  <g class="grid"><rect x="-32" y="-32" width="1264" height="444" fill="url(#grid)"/></g>

  <circle class="pulse" cx="1010" cy="80" r="118" fill="#000" opacity=".035"/>
  <circle class="pulse" cx="250" cy="320" r="150" fill="#000" opacity=".025"/>
  <path class="dash" d="M72 306C236 232 352 344 524 276C678 215 790 106 1124 154" stroke="#18181B" stroke-width="1.6" stroke-linecap="round" opacity=".18"/>
  <path class="dash" d="M72 326C256 256 365 356 548 302C710 255 818 166 1124 196" stroke="#71717A" stroke-width="1.1" stroke-linecap="round" opacity=".18"/>

  <g class="fade" filter="url(#shadow)">
    <rect x="58" y="52" width="668" height="264" rx="28" fill="#fff" stroke="#E4E4E7"/>
    <rect x="94" y="86" width="124" height="32" rx="16" fill="#F4F4F5" stroke="#E4E4E7"/>
    <circle cx="111" cy="102" r="4" fill="#18181B"/>
    <text x="164" y="107" text-anchor="middle" fill="#18181B" font-family="Inter, Geist, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="0.6">PRODUCT UI</text>

    <g clip-path="url(#nameClip)">
      <text x="94" y="164" fill="#09090B" font-family="Inter, Geist, Segoe UI, Arial, sans-serif" font-size="56" font-weight="850">Melad Samuel</text>
    </g>
    <rect class="caret" x="94" y="121" width="4" height="50" rx="2" fill="#09090B"/>

    <text x="97" y="205" fill="#27272A" font-family="Inter, Geist, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Full Stack • Cloud Native • Kubernetes Security</text>
    <text x="98" y="238" fill="#71717A" font-family="Inter, Geist, Segoe UI, Arial, sans-serif" font-size="16">Building practical products from idea to production.</text>

    <rect x="96" y="268" width="116" height="32" rx="16" fill="#fff" stroke="#D4D4D8"/>
    <text x="154" y="289" text-anchor="middle" fill="#18181B" font-family="Inter, Geist, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">WordPress</text>
    <rect x="224" y="268" width="86" height="32" rx="16" fill="#fff" stroke="#D4D4D8"/>
    <text x="267" y="289" text-anchor="middle" fill="#18181B" font-family="Inter, Geist, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">React</text>
    <rect x="322" y="268" width="116" height="32" rx="16" fill="#fff" stroke="#D4D4D8"/>
    <text x="380" y="289" text-anchor="middle" fill="#18181B" font-family="Inter, Geist, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">Kubernetes</text>
    <rect x="450" y="268" width="96" height="32" rx="16" fill="#fff" stroke="#D4D4D8"/>
    <text x="498" y="289" text-anchor="middle" fill="#18181B" font-family="Inter, Geist, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">Security</text>
  </g>

  <g class="float" filter="url(#shadow)">
    <rect x="770" y="58" width="356" height="244" rx="26" fill="#fff" stroke="#E4E4E7"/>
    <rect x="790" y="78" width="316" height="40" rx="14" fill="#FAFAFA" stroke="#E4E4E7"/>
    <circle cx="812" cy="98" r="5" fill="#18181B"/>
    <circle cx="830" cy="98" r="5" fill="#A1A1AA"/>
    <circle cx="848" cy="98" r="5" fill="#D4D4D8"/>
    <text x="804" y="146" fill="#09090B" font-family="Inter, Geist, Segoe UI, Arial, sans-serif" font-size="21" font-weight="850">Product dashboard</text>
    <text x="804" y="172" fill="#71717A" font-family="Inter, Geist, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">clean cards · strong hierarchy · product focus</text>
    <g class="fade2">
      <rect x="804" y="194" width="290" height="38" rx="13" fill="#FAFAFA" stroke="#E4E4E7"/>
      <circle class="pulse" cx="826" cy="213" r="6" fill="#18181B"/>
      <text x="844" y="218" fill="#27272A" font-family="Inter, Geist, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">Building FormInbox</text>
      <rect x="804" y="244" width="290" height="38" rx="13" fill="#FAFAFA" stroke="#E4E4E7"/>
      <circle class="pulse" cx="826" cy="263" r="6" fill="#71717A"/>
      <text x="844" y="268" fill="#27272A" font-family="Inter, Geist, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">Cloud Native + Product UX</text>
    </g>
  </g>

  <g opacity=".98">
    <rect x="778" y="318" width="92" height="30" rx="15" fill="#fff" stroke="#D4D4D8"/>
    <text x="824" y="338" text-anchor="middle" fill="#18181B" font-family="Inter, Geist, Segoe UI, Arial, sans-serif" font-size="12" font-weight="800">MVP</text>
    <rect x="882" y="318" width="112" height="30" rx="15" fill="#fff" stroke="#D4D4D8"/>
    <text x="938" y="338" text-anchor="middle" fill="#18181B" font-family="Inter, Geist, Segoe UI, Arial, sans-serif" font-size="12" font-weight="800">Feedback</text>
    <rect x="1006" y="318" width="106" height="30" rx="15" fill="#fff" stroke="#D4D4D8"/>
    <text x="1059" y="338" text-anchor="middle" fill="#18181B" font-family="Inter, Geist, Segoe UI, Arial, sans-serif" font-size="12" font-weight="800">Ship</text>
  </g>

  <rect x=".5" y=".5" width="1199" height="379" rx="29.5" stroke="#E4E4E7"/>
</svg>